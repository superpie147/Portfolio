    <p>【第二段起：展開你的觀察與思考。每段一個重點。】</p>
    <h2>【小標題（可有可無）】</h2>
    <p>【需要分節時使用 h2 小標題。】</p>
    <p>【結尾：不必給出結論，留下一個你還在想的問題也很好。】</p>
    </article>
    <aside class="toc-box"><div class="toc-title">CONTENTS</div><ul id="toc" class="toc"></ul></aside>
  </div>

<script>
(function () {
  var art = document.querySelector(".article");
  var toc = document.getElementById("toc");
  if (!art || !toc) return;
  var hs = art.querySelectorAll("h2, h3");
  if (!hs.length) { toc.parentElement.style.display = "none"; return; }
  var n2 = 0, n3 = 0, html = "";
  hs.forEach(function (h, i) {
    if (!h.id) h.id = "sec-" + i;
    var num;
    if (h.tagName === "H2") { n2++; n3 = 0; num = n2; }
    else { n3++; num = n2 + "." + n3; }
    html += '<li class="' + h.tagName.toLowerCase() + '"><a href="#' + h.id + '">' + num + "&nbsp;&nbsp;" + h.textContent + "</a></li>";
  });
  toc.innerHTML = html;
})();
</script>
